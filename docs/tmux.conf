# gwn — workspace navigator tmux integration
#
# Add to ~/.config/tmux/tmux.conf (or ~/.tmux.conf)
#
# M-p opens the workspace picker in a floating popup.
# gwn calls `tmux switch-client` internally, so the popup closes after selection.

bind -n M-p display-popup \
  -E \
  -w 80% \
  -h 70% \
  -b rounded \
  -T " workspaces " \
  "gwn"

# Optional: open a specific path without the TUI (e.g. from a shell alias)
# bind -n M-o command-prompt -p "open path:" "run-shell 'gwn open %1'"
